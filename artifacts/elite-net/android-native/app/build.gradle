// ─── App-level build.gradle ─────────────────────────────────────────────────
// Google Play 2026 compliant:
//   - targetSdk 34 (Android 14)
//   - R8 full-mode obfuscation enabled
//   - AAB output for Play Store upload
//   - APK output for direct install / testing
//   - Signed release config

apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.google.gms.google-services"

android {
    compileSdk 34
    buildToolsVersion "34.0.0"
    namespace "com.elitenet.vpn"

    defaultConfig {
        applicationId  "com.elitenet.vpn"
        minSdk         24          // Android 7.0+ covers 99%+ of active devices
        targetSdk      34          // Required by Play Store 2024+
        versionCode    1
        versionName    "1.0.0"

        // No unnecessary permissions — only what's declared in manifest
        // Splash screen resource (generated by Expo prebuild)
        resValue "string", "app_name", "Elite Net VPN"
    }

    // ── Signing ─────────────────────────────────────────────────────────────
    signingConfigs {
        release {
            storeFile     file("elite-net-release.keystore")
            storePassword System.getenv("KEYSTORE_PASS") ?: ""
            keyAlias      "elite-net"
            keyPassword   System.getenv("KEY_PASS")      ?: ""
        }
    }

    // ── Build types ──────────────────────────────────────────────────────────
    buildTypes {
        debug {
            debuggable          true
            minifyEnabled       false
            applicationIdSuffix ".debug"
            versionNameSuffix   "-debug"
        }

        release {
            signingConfig   signingConfigs.release
            debuggable      false

            // ── R8 Full Mode — maximum code obfuscation + shrinking ──────────
            // This makes decompiled APK/AAB unreadable.
            // Class names, method names, and field names are renamed to a/b/c/...
            minifyEnabled   true
            shrinkResources true

            proguardFiles(
                getDefaultProguardFile("proguard-android-optimize.txt"),
                "proguard-rules.pro"
            )

            // Enable R8 full mode for stronger obfuscation
            // Add to gradle.properties:  android.enableR8.fullMode=true
        }
    }

    // ── Bundle (AAB) config — required for Play Store upload ────────────────
    bundle {
        language {
            enableSplit = true   // smaller downloads per locale
        }
        density {
            enableSplit = true   // smaller downloads per screen density
        }
        abi {
            enableSplit = true   // separate APK per CPU architecture
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }

    repositories {
        flatDir { dirs 'libs' }
    }

    // Exclude duplicate license files that cause merge conflicts
    packaging {
        resources {
            excludes += [
                "META-INF/LICENSE",
                "META-INF/LICENSE.txt",
                "META-INF/NOTICE",
                "META-INF/NOTICE.txt",
                "META-INF/*.kotlin_module"
            ]
        }
    }
}

dependencies {
    // ── React Native (do not remove — generated by Expo) ────────────────────
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // ── V2RayCore (place v2ray-core.aar in android/app/libs/) ───────────────
    implementation(name: 'v2ray-core', ext: 'aar')
    implementation "androidx.core:core-ktx:1.12.0"
    implementation "androidx.localbroadcastmanager:localbroadcastmanager:1.1.0"

    // ── Unity Ads SDK — Game ID 60907 ────────────────────────────────────────
    implementation "com.unity3d.ads:unity-ads:4.9.2"

    // ── Firebase Cloud Messaging ─────────────────────────────────────────────
    implementation platform("com.google.firebase:firebase-bom:32.7.0")
    implementation "com.google.firebase:firebase-messaging-ktx"

    // ── VPN service ──────────────────────────────────────────────────────────
    implementation "androidx.lifecycle:lifecycle-service:2.7.0"
}
